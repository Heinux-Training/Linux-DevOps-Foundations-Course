server {
    listen 80;
    listen [::]:80;

    server_name shop-info.local;

    root /var/www/server2;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/shop-information.access.log;
    error_log /var/log/nginx/shop-information.error.log;
}
